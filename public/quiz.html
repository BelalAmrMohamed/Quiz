<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إمتحان</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Open Graph Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#0088cc">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://basmagi-quiz.vercel.app/">
    <meta property="og:title" content="منصة إمتحانات البصمجي: إختبر أدائك في الإمتحانات بجميع المستويات">
    <meta property="og:description" content="أقل من 5% من الناس تقدر تختم اغلب الإمتحانات، هل انت واحد منهم؟">
    <meta property="og:image" content="https://basmagi-quiz.vercel.app/assets/images/quiz-thumbnail.jpeg">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    <meta property="og:site_name" content="منصة إمتحانات البصمجي">
    <meta property="og:locale" content="ar_AR">

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quiz In Progress">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- PWA Manifest & Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icon-180.png">
    <link rel="apple-touch-icon" sizes="192x192" href="assets/images/icon-192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/icon-16.png">

    <!-- CRITICAL: Anti-flash script -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem("quiz_theme_pref") || "light";
            const savedAnimations = localStorage.getItem("quiz_animations_pref") !== "disabled";
            document.documentElement.setAttribute("data-theme", savedTheme);
            document.documentElement.setAttribute("data-animations", savedAnimations ? "enabled" : "disabled");
        })();
    </script>

    <!-- Fonts: Inter (Latin) + Tajawal (Arabic) — optimized loading -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'; this.onload=null;">
    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap"
            rel="stylesheet">
    </noscript>

    <!-- CSS Files - CRITICAL ORDER -->
    <link rel="stylesheet" href="src/styles/themes.css">
    <link rel="stylesheet" href="src/styles/quiz.css">
    <link rel="stylesheet" href="src/components/side-menu.css">
    <link rel="stylesheet" href="src/components/notifications.css">

    <!-- ── Markdown + KaTeX integration (mirrored from create-quiz) ──
         KaTeX must load as a classic (non-deferred) script so that
         window.katex is synchronously available when ES modules execute.
         No SRI hashes: jsDelivr serves the canonical npm release unmodified.
         Pinned to 0.16.9 exactly — do NOT add defer/async. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- Theme Controller - Load once as module -->
    <script type="module" src="src/shared/theme-controller.js"></script>

    <!-- Canvas Animation Script - Only loads if user enabled animations -->
    <script type="module" src="src/shared/canvas-animation.js"></script>
</head>

<body>
    <!-- The status bar at the top -->
    <div class="stats-bar" id="statsBar">
        <!-- Mobile-only hamburger button (hidden on desktop via CSS) -->
        <button class="hamburger-stats" id="menuBtn" aria-label="فتح القائمة" aria-controls="sidebar"
            aria-expanded="false" type="button">
            <svg class="hamburger-icon" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true" focusable="false">
                <line class="bar bar-top" x1="2" y1="5" x2="20" y2="5" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" />
                <line class="bar bar-mid" x1="2" y1="11" x2="20" y2="11" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" />
                <line class="bar bar-bottom" x1="2" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" />
            </svg>
        </button>

        <div class="stats-content">
            <div class="stat-item">
                <span class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-star-icon lucide-star">
                        <path
                            d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" />
                    </svg></span>
                <span class="stat-value" id="statLevel">Lv 1</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-trophy-icon lucide-trophy">
                        <path d="M10 14.66v1.626a2 2 0 0 1-.976 1.696A5 5 0 0 0 7 21.978" />
                        <path d="M14 14.66v1.626a2 2 0 0 0 .976 1.696A5 5 0 0 1 17 21.978" />
                        <path d="M18 9h1.5a1 1 0 0 0 0-5H18" />
                        <path d="M4 22h16" />
                        <path d="M6 9a6 6 0 0 0 12 0V3a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1z" />
                        <path d="M6 9H4.5a1 1 0 0 1 0-5H6" />
                    </svg></span>
                <span class="stat-value" id="statPoints">0 pts</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-flame-icon lucide-flame">
                        <path
                            d="M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4" />
                    </svg></span>
                <span class="stat-value" id="statStreak">0 day</span>
            </div>
        </div>
    </div>

    <!-- Backdrop (mobile overlay) -->
    <div class="side-menu-backdrop" id="sideMenuBackdrop" aria-hidden="true" role="presentation"></div>

    <!-- Side-menu (using side-menu.js and side-menu.css) -->
    <aside class="sidebar" id="sidebar" role="dialog" aria-modal="true" aria-label="القائمة الجانبية" aria-hidden="true"
        tabindex="-1">

        <!-- Desktop expand/collapse toggle -->
        <button class="sidebar-toggle" title="القائمة الجانبية" id="sidebarToggle" aria-label="توسيع القائمة"
            type="button">
            <svg class="toggle-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>

        <!-- Sidebar Logo Thumbnail -->
        <div class="sidebar-logo sidebar-expanded-only" title="منصة إمتحانات بصمجي">
            <svg xmlns="http://www.w3.org/2000/svg" width="180" height="40" viewBox="0 0 220 40"
                style="direction: ltr;">
                <image x="0" y="0" width="40" height="40" href="./favicon.png" />
                <text x="50" y="27" font-family="Tajawal, Arial, sans-serif" font-size="17" font-weight="bold"
                    fill="currentColor" text-anchor="start">إمتحانات بصمجي</text>
            </svg>
        </div>

        <nav role="navigation" aria-label="روابط التنقل">
            <button id="finishBtn" class="menu-item action-btn" data-action="finishEarly" title="تسليم الإمتحان"
                data-tooltip="تسليم الإمتحان">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <path d="m9 12 2 2 4-4" />
                </svg>
                <span class="menu-label">تسليم الإمتحان</span>
            </button>

            <button id="restartBtn" class="menu-item action-btn" data-action="restartQuiz" title="إعادة الإمتحان"
                data-tooltip="إعادة الإمتحان">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
                <span class="menu-label">إعادة الإمتحان</span>
            </button>

            <button id="exitBtn" class="menu-item action-btn" onclick="exitQuiz()" title="الصفحة الرئيسية"
                data-tooltip="الصفحة الرئيسية">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                    <path
                        d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                </svg>
                <span class="menu-label">خروج إلى الصفحة الرئيسية</span>
            </button>

            <div class="menu-divider"></div>

            <button id="shareQuestionBtn" class="menu-item action-btn" onclick="window.shareQuestion()"
                data-tooltip="مشاركة السؤال">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <circle cx="18" cy="5" r="3" />
                    <circle cx="6" cy="12" r="3" />
                    <circle cx="18" cy="19" r="3" />
                    <line x1="8.59" x2="15.42" y1="13.51" y2="17.49" />
                    <line x1="15.41" x2="8.59" y1="6.51" y2="10.49" />
                </svg>
                <span class="menu-label">مشاركة السؤال</span>
            </button>

            <div class="menu-divider"></div>

            <div class="theme-controls-section sidebar-expanded-only">
                <div class="theme-section-header sidebar-expanded-only">
                    <span><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            aria-hidden="true">
                            <path
                                d="M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8z" />
                            <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
                            <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
                            <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
                            <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" />
                        </svg></span> الخلفية
                </div>
                <div class="theme-selector-grid" role="group" aria-label="اختيار الخلفية">
                    <button class="theme-selector-btn" data-theme="dark" aria-pressed="false">
                        <span class="theme-btn-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg"
                                width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                            </svg></span>
                        <span class="theme-btn-label">السوداء</span>
                    </button>
                    <button class="theme-selector-btn" data-theme="dark-slate" aria-pressed="false">
                        <span class="theme-btn-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg"
                                width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401" />
                            </svg></span>
                        <span class="theme-btn-label">الزرقاء</span>
                    </button>
                    <button class="theme-selector-btn" data-theme="light" aria-pressed="false">
                        <span class="theme-btn-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg"
                                width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="4" />
                                <path
                                    d="M12 2v2M12 20v2m-7.07-14.07 1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2m-4.93-7.07-1.41 1.41M6.34 17.66l-1.41 1.41" />
                            </svg></span>
                        <span class="theme-btn-label">البيضاء</span>
                    </button>
                </div>

                <div class="animation-section-header">
                    <span><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            aria-hidden="true">
                            <path
                                d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z" />
                            <path d="M20 2v4M22 4h-4" />
                            <circle cx="4" cy="20" r="2" />
                        </svg></span> الرسوم المتحركة
                </div>
                <label class="animation-toggle-container">
                    <span class="animation-toggle-label">تفعيل الرسوم</span>
                    <input type="checkbox" id="animationToggle" class="toggle-input" data-control="animations" checked
                        aria-label="تفعيل الرسوم المتحركة">
                    <span class="toggle-switch" aria-hidden="true"></span>
                </label>
            </div>

            <div class="menu-divider sidebar-expanded-only"></div>

            <button id="viewToggle" class="menu-item view-toggle-btn sidebar-expanded-only" data-tooltip="شكل القائمة">
                <span id="viewIcon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 5h.01M3 12h.01M3 19h.01M8 5h13M8 12h13M8 19h13" />
                    </svg></span>
                <span class="menu-label" id="viewText">شكل القائمة</span>
            </button>

            <div class="menu-divider sidebar-expanded-only"></div>

            <!-- List or Grid view navigations get displayed here -->
            <div id="menuNavContainer" class="sidebar-expanded-only">
            </div>

            <div class="menu-divider sidebar-expanded-only"></div>

            <!-- bookmark and flag buttons -->
            <button id="menuBookmarkBtn" class="menu-item action-btn sidebar-expanded-only"
                onclick="window.toggleBookmark()" data-tooltip="حفظ في المفضلة">
                <span id="menuBookmarkIcon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path
                            d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" />
                    </svg></span>
                <span class="menu-label" id="menuBookmarkText">حفظ في المفضلة</span>
            </button>

            <button id="menuFlagBtn" class="menu-item action-btn sidebar-expanded-only" onclick="window.toggleFlag()"
                data-tooltip="إضافة علامة للمراجعة">
                <span id="menuFlagIcon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path
                            d="M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528" />
                    </svg></span>
                <span class="menu-label" id="menuFlagText">إضافة علامة للمراجعة</span>
            </button>
        </nav>
    </aside>

    <div class="container">
        <!-- The top header containing the title and timer, etc... -->
        <div class="header">
            <div class="header-top">
                <div class="header-title-section">
                    <h1 id="quizTitle">...جاري التحميل</h1>
                    <div class="header-subtitle">
                        <div class="timer-badge" id="timerBadge">
                            <svg class="timer-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <span id="timer">00:00</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-header">
                    <span class="progress-percentage" id="progressText">0% (0/0)</span>
                    <span class="progress-label">:التقدم</span>
                </div>
                <div class="progress-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <!-- The questions get displayed here from the javascript -->
        <div id="questionContainer" class="loading">
            <p>جاري تحضير الإختبار</p>
        </div>

        <!-- navigation buttons at the bottom -->
        <div class="navigation">
            <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">
                → التالي
            </button>
            <button class="nav-btn" id="prevBtn" onclick="prevQuestion()" disabled>
                السابق ←
            </button>
        </div>
    </div>

    <script type="module" src="src/scripts/quiz.js"></script>
    <script type="module" src="src/components/side-menu.js"></script>
</body>

</html>
